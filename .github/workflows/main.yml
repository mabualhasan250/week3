name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          # Note: repository_owner is safer for image naming
          tags: ghcr.io/${{ github.repository_owner }}/week3-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./templates/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/week3-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Navigate directly to your Desktop where the docker-compose.yml is
            cd ~/Desktop
            
            # 2. Login to GHCR (required to pull your images)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Update the .env file on your Desktop with your OpenAI key
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
            
            # 4. Pull the latest images from GitHub
            docker-compose pull
            
            # 5. Restart the containers
            docker-compose up -d
            
            # 6. Clean up old image versions to save space
            docker image prune -f
